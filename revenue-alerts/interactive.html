function money(n){return '$'+Math.round(n).toLocaleString()}
function spark(series, fire){
  if(!series||series.length<2) return '<span style="color:var(--hint)">—</span>';
  const w=104,h=26,p=3,mn=Math.min(...series),mx=Math.max(...series),rg=(mx-mn)||1;
  const x=i=>p+i*(w-2*p)/(series.length-1), y=v=>h-p-(v-mn)/rg*(h-2*p);
  const pts=series.map((v,i)=>x(i).toFixed(1)+','+y(v).toFixed(1)).join(' ');
  const col=fire?'#f87171':'#5dcaa5', last=series.length-1;
  return '<svg width="'+w+'" height="'+h+'" style="vertical-align:middle">'
    +'<polyline fill="none" stroke="'+col+'" stroke-width="1.5" points="'+pts+'"/>'
    +'<circle cx="'+x(last).toFixed(1)+'" cy="'+y(series[last]).toFixed(1)+'" r="2.4" fill="'+col+'"/></svg>';
}
function deltaCell(k){

  const up=k.pctNum>=100, good=(k.aid!=='R5'&&k.aid!=='R12')?up:!up;
  return '<span class="delta '+(good?'pos':'neg')+'">'+k.pctNum+'%</span>';
}
function miniTable(title, rows){
  if(!rows||!rows.length) return '';
  const mx=Math.max(...rows.map(r=>r[1]))||1;
  let h='<div class="sub2">'+title+'</div><table class="mini">';
  for(const [n,v] of rows){
    const wpx=Math.max(2,Math.round(v/mx*90));
    h+='<tr><td>'+n+'</td><td class="r">'+money(v)+'<span class="barfill" style="width:'+wpx+'px"></span></td></tr>';
  }
  return h+'</table>';
}

    h+='<div class="sub2">Day-by-day ('+D.days[0]+' → '+D.days[D.days.length-1]+')</div><table class="mini">';
    for(let i=0;i<D.days.length;i++){
      const last=i===D.days.length-1;
      const val=k.fmt==='usd'?money(k.series[i]):k.fmt==='pct'?k.series[i].toFixed(2)+'%':Math.round(k.series[i]).toLocaleString();
      h+='<tr><td'+(last?' style="color:var(--accent)"':'')+'>'+D.days[i]+(last?' · D-1':'')+'</td><td class="r"'+(last?' style="color:var(--accent)"':'')+'>'+val+'</td></tr>';
    }
    h+='</table>';
  }
  if(k.drill) for(const t in k.drill) h+=miniTable(t+' breakdown (D-1)', k.drill[t]);
  h+='<div class="sub2">Source / query</div><pre>'+k.query+'</pre></div>';
  return h;
}
function render(){
  let list=D.kpis.filter(k=>(filter==='all'||k.status===filter)&&k.name.toLowerCase().includes(q));
  list.sort((a,b)=>{
    let x=a[sortK],y=b[sortK];
    if(sortK==='pctNum'){x=x==null?-1:x;y=y==null?-1:y}
    if(typeof x==='string'){x=x.toLowerCase();y=y.toLowerCase()}
    return (x<y?-1:x>y?1:0)*(sortAsc?1:-1);
  });
  let h='';
  for(const k of list){
    const fire=k.status==='FIRING';
    h+='<tr class="kpi'+(fire?' fire':'')+'" data-aid="'+k.aid+'">'
      +'<td class="aid">'+k.aid+'</td><td class="name">'+k.name+'<div class="rwhy">'+(k.why||'')+'</div></td>'
      +'<td><span class="st '+(fire?'fire':'ok')+'">'+k.status+'</span></td>'
      +'<td>'+k.cur+'</td><td>'+deltaCell(k)+'</td><td>'+spark(k.series,fire)+'</td></tr>'
      +'<tr class="detail" data-for="'+k.aid+'"><td colspan="6">'+panel(k)+'</td></tr>';
  }
  $('#tb').innerHTML=h;
  document.querySelectorAll('tr.kpi').forEach(tr=>tr.onclick=()=>{
    const d=document.querySelector('tr.detail[data-for="'+tr.dataset.aid+'"]');d.classList.toggle('open');
  });
}
function paint(){   // re-render everything tied to the currently-selected day D
  $('#ttl').textContent='— '+D.target+' (IST · D-1)';
  $('#sub').textContent='baseline = trailing 7-day median ('+D.baseline+') · MySQL is_stripepayments + renewals (FX→USD) · ClickHouse funnel.';
  $('#cards').innerHTML=
    '<div class="mc"><div class="l">Firing</div><div class="v" style="color:'+(D.n_fire?'var(--bad)':'var(--ok)')+'">'+D.n_fire+'</div></div>'
   +'<div class="mc"><div class="l">OK</div><div class="v" style="color:var(--ok)">'+D.n_ok+'</div></div>'
   +'<div class="mc"><div class="l">Total KPIs</div><div class="v">'+D.kpis.length+'</div></div>'
   +'<div class="mc"><div class="l">Target day</div><div class="v" style="font-size:17px">'+D.target.slice(5)+' <span style="font-size:12px;color:var(--hint)">D-1</span></div></div>';
  $('#ft').textContent='Generated for '+D.target+'. Refunds/chargebacks not yet trackable. Highest-subscription ranking applies the amount>0 + mapped-currency guard.';
  render();
}
function init(){
  if(MULTI){
    const sel=$('#datesel');
    sel.innerHTML=MULTI.dates.slice().reverse().map(d=>'<option value="'+d+'">'+d+' (IST · D-1)</option>').join('');
    sel.value=D.target;
    sel.onchange=e=>{D=MULTI.byDate[e.target.value];paint();};
  } else { const w=$('#datewrap'); if(w) w.style.display='none'; }
  document.querySelectorAll('.chip').forEach(c=>c.onclick=()=>{
    document.querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));c.classList.add('on');filter=c.dataset.f;render();
  });
  $('#q').oninput=e=>{q=e.target.value.toLowerCase();render();};
  document.querySelectorAll('thead th').forEach(th=>th.onclick=()=>{
    const k=th.dataset.k; if(k==='none')return;
    if(sortK===k)sortAsc=!sortAsc;else{sortK=k;sortAsc=true;}
    document.querySelectorAll('thead th').forEach(x=>{x.querySelector('.ar')&&x.querySelector('.ar').remove()});
    th.insertAdjacentHTML('beforeend',' <span class="ar">'+(sortAsc?'▲':'▼')+'</span>');render();
  });
  paint();
}
init();
</script></body></html>
